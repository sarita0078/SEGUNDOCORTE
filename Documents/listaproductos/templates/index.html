<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <h1>Lista de Productos</h1>

    <table>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Valor Unidad</th>
            <th>Existencias</th>
            <th>Valor Total</th>
            <th>Estado Inventario</th>
        </tr>
    </table>

    <script>
        const productos = [
            { codigo: 1, nombre: "Cuaderno", valoru: 5000, existencias: 100 },
            { codigo: 2, nombre: "Esfero", valoru: 2500, existencias: 250 },
            { codigo: 3, nombre: "Lapiz", valoru: 1500, existencias: 300 }
        ];

        const tabla = document.querySelector("table");

        productos.forEach(p => {
            const valorTotal = p.valoru * p.existencias;

            let estado = "";
            let clase = "";
            if (p.existencias < 50) {
                estado = "Bajo";
                clase = "bajo";
            } else if (p.existencias <= 100) {
                estado = "Medio";
                clase = "medio";
            } else {
                estado = "Alto";
                clase = "alto";
            }

            const fila = `
                <tr>
                    <td>${p.codigo}</td>
                    <td>${p.nombre}</td>
                    <td>$${p.valoru.toLocaleString()}</td>
                    <td>${p.existencias}</td>
                    <td>$${valorTotal.toLocaleString()}</td>
                    <td class="${clase}">${estado}</td>
                </tr>
            `;
            tabla.innerHTML += fila;
        });
    </script>

</body>
</html>
